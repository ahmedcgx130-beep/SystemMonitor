name: Build Production Signed APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Create Fake Env File
        run: |
          touch ./system-monitor/.env
          touch ./system-monitor/.env.example
          echo "API_KEY=fake_key_for_building" > ./system-monitor/.env
          echo "API_KEY=fake_key_for_building" > ./system-monitor/.env.example

      - name: Setup Gradle Build Environment
        uses: gradle/actions/setup-gradle@v3

      - name: Build Unsigned Production APK
        run: |
          cd system-monitor
          gradle assembleRelease -Pandroid.overrideVersionCheck=true

      - name: Sign Production APK (Proof of Ownership)
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: system-monitor/app/build/outputs/apk/release
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Upload Certified Production APK
        uses: actions/upload-artifact@v4
        with:
          name: Production-Signed-APK
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
