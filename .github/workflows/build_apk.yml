name: Build Production Certified APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Create Required Env Files
        run: |
          touch ./system-monitor/.env
          touch ./system-monitor/.env.example
          echo "API_KEY=fake_key_for_building" > ./system-monitor/.env
          echo "API_KEY=fake_key_for_building" > ./system-monitor/.env.example

      - name: Inject Admob IDs to AndroidManifest Context
        run: |
          sed -i '/<\/application>/i \        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-1929899985079401~7361269203"\/>' ./system-monitor/app/src/main/AndroidManifest.xml

      - name: Setup Gradle Build Tools
        uses: gradle/actions/setup-gradle@v3

      - name: Compile and Extract Final App
        run: |
          cd system-monitor
          chmod +x gradlew || true
          gradle assembleDebug -Pandroid.overrideVersionCheck=true

      - name: Export Ready To Publish APK
        uses: actions/upload-artifact@v4
        with:
          name: Production-Mofied-APK
          path: system-monitor/app/build/outputs/apk/debug/
