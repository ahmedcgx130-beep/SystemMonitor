name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Create Fake Env File
        run: |
          touch ./system-monitor/.env
          touch ./system-monitor/.env.example
          echo "API_KEY=fake_key_for_building" > ./system-monitor/.env
          echo "API_KEY=fake_key_for_building" > ./system-monitor/.env.example

      - name: Force Generate Local Gradle Wrapper
        run: |
          cd system-monitor
          gradle wrapper --gradle-version 8.4 --distribution-type bin

      - name: Setup Gradle Build Environment
        uses: gradle/actions/setup-gradle@v3

      - name: Grant Permission and Build APK
        run: |
          cd system-monitor
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: system-monitor-apk
          path: system-monitor/app/build/outputs/apk/debug/
