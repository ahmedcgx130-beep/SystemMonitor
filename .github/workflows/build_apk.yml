name: Build Production Signed APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Create Fake Env File
        run: |
          touch ./system-monitor/.env
          touch ./system-monitor/.env.example
          echo "API_KEY=fake_key_for_building" > ./system-monitor/.env
          echo "API_KEY=fake_key_for_building" > ./system-monitor/.env.example

      - name: Setup Gradle Build Environment
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Official Production Keystore (Proof of Ownership)
        run: |
          cd system-monitor
          keytool -genkeypair -v \
            -keystore app/keystore.jks \
            -alias "${{ secrets.KEY_ALIAS }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -dname "CN=ahmedfady, OU=ahmed, O=SystemMonitor, L=Cairo, S=Cairo, C=EG"

      - name: Inject Signing Configuration into Gradle
        run: |
          cd system-monitor/app
          cat <<EOF >> build.gradle
          
          android {
              signingConfigs {
                  release {
                      storeFile file("keystore.jks")
                      storePassword "${{ secrets.KEYSTORE_PASSWORD }}"
                      keyAlias "${{ secrets.KEY_ALIAS }}"
                      keyPassword "${{ secrets.KEYSTORE_PASSWORD }}"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF

      - name: Build Signed Production APK
        run: |
          cd system-monitor
          gradle assembleRelease --stacktrace -Pandroid.overrideVersionCheck=true

      - name: Upload Certified Production APK
        uses: actions/upload-artifact@v4
        with:
          name: Production-Signed-APK
          path: system-monitor/app/build/outputs/apk/release/
