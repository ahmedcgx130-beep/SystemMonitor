name: Build Production Signed APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Create Fake Env File
        run: |
          touch ./system-monitor/.env
          touch ./system-monitor/.env.example
          echo "API_KEY=fake_key_for_building" > ./system-monitor/.env
          echo "API_KEY=fake_key_for_building" > ./system-monitor/.env.example

      - name: Generate Required Upload Keystore (Proof of Ownership)
        run: |
          cd system-monitor
          keytool -genkeypair -v \
            -keystore app/my-upload-key.jks \
            -alias "upload" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "android" \
            -keypass "android" \
            -dname "CN=ahmedfady, OU=ahmed, O=SystemMonitor, L=Cairo, S=Cairo, C=EG"

      - name: Inject Core MainActivity Code with Admob Cleanly
        run: |
          cd system-monitor/app/src/main/java/com/example
          cat << 'EOF' > MainActivity.kt
          package com.example

          import android.os.Bundle
          import androidx.activity.ComponentActivity
          import androidx.activity.compose.setContent
          import androidx.compose.foundation.layout.*
          import androidx.compose.material3.*
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.unit.dp
          import androidx.compose.ui.viewinterop.AndroidView
          import com.google.android.gms.ads.*

          class MainActivity : ComponentActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  MobileAds.initialize(this) {}
                  setContent {
                      MaterialTheme {
                          Surface(modifier = Modifier.fillMaxSize(), color = MaterialTheme.colorScheme.background) {
                              Column(modifier = Modifier.fillMaxSize()) {
                                  Box(modifier = Modifier.weight(1f)) {
                                      Text(text = "System Monitor Active", modifier = Modifier.padding(16.dp))
                                  }
                                  AdmobBannerView()
                              }
                          }
                      }
                  }
              }
          }

          @Composable
          fun AdmobBannerView() {
              AndroidView(
                  modifier = Modifier.fillMaxWidth().height(50.dp),
                  factory = { context ->
                      AdView(context).apply {
                          setAdSize(AdSize.BANNER)
                          this.adUnitId = "ca-app-pub-1929899985079401/3325253053"
                          loadAd(AdRequest.Builder().build())
                      }
                  }
              )
          }
          EOF

      - name: Force Overwrite Signing Config inside Build Gradle KTS
        run: |
          cd system-monitor/app
          cat << 'EOF' >> build.gradle.kts
          
          android {
              signingConfigs {
                  getByName("release") {
                      storeFile = file("my-upload-key.jks")
                      storePassword = "android"
                      keyAlias = "upload"
                      keyPassword = "android"
                  }
              }
          }
          EOF

      - name: Setup Gradle Build Environment
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4 # إجبار السيرفر على استخدام هذا الإصدار المتوافق

      - name: Build Certified Production APK
        run: |
          cd system-monitor
          gradle assembleRelease -Pandroid.overrideVersionCheck=true

      - name: Upload Certified Production APK
        uses: actions/upload-artifact@v4
        with:
          name: Production-Signed-APK
          path: system-monitor/app/build/outputs/apk/release/
